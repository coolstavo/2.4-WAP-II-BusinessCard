<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JACB - Digital Business Card</title>
    <style>
        :root {
            --primary: #007906;
            --bg: #0e420e;
            --card-bg: #fff;
            --text: #333;
            --muted: #555;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        @font-face {
            font-family: 'Bricolage Grotesque';
            src: url('assets/fonts/Bricolage Grotesque.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Climate Crisis';
            src: url('assets/fonts/Climate Crisis.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0.2rem;
            box-sizing: border-box;
        }

        .card {
            position: relative;
            width: 99vw;
            height: 85vh;
            border-radius: 20px;
            padding: 3.5rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border-color);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            font-family: 'Bricolage Grotesque', sans-serif;
            background-color: var(--card-bg);
            overflow: hidden;
        }

        .card-border {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .card img {
            width: 200px;
            height: auto;
            object-fit: contain;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--muted);
            font-family: 'Climate Crisis', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            text-align: center;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
            text-align: left;
        }

        .info p {
            margin: 0;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.5rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
            gap: 0.5rem; /* Added spacing between label and data */
        }

        .info span {
            text-transform: uppercase;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            word-break: break-word;
            font-size: 1rem;
            text-align: right;
        }

        .lang-toggle {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.4rem 0.8rem;
            font-size: 1.5rem;
            margin-top: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .lang-toggle:hover {
            background: #005c04;
        }

        @media (max-width: 400px) {
            .card {
                padding: 1rem;
            }
        }


    </style>
</head>
