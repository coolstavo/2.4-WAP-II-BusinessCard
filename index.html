<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JACB - Digital Business Card</title>
    <style>

        .card {
            position: relative;
            width: 100vw;
            height: 91vh;
            border-radius: 20px;
            overflow: hidden;
            font-family: 'Bricolage Grotesque', sans-serif;
            background: var(--card-bg);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border-color);
        }

        .card-border {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        :root {
            --primary: #007906;
            --bg: #eaf4ea;
            --card-bg: #fff;
            --text: #333;
            --muted: #555;
            --border-color: rgba(0, 0, 0, 0.1);
            --card-bg-image: url('Assets/svg/textAsset 1.svg');
        }

        @font-face {
            font-family: 'Bricolage Grotesque';
            src: url('Assets/fonts/Bricolage Grotesque.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Climate Crisis';
            src: url('Assets/fonts/Climate Crisis.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0.2rem;
            box-sizing: border-box;
        }

        .card {
            position: relative;
            width: 99vw;
            height: 85vh;
            border-radius: 20px;
            padding: 3.5rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border-color);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            font-family: 'Bricolage Grotesque', sans-serif;
        }

        .card-border {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .card img {
            width: 200px;
            height: auto;
            object-fit: contain;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--muted);
            font-family: 'Climate Crisis', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            text-align: center;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
            text-align: left;
        }

        .info p {
            margin: 0;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.5rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .info span {
            text-transform: uppercase;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            word-break: break-word;
            font-size: 1rem;
            text-align: right;
        }

        .lang-toggle {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.4rem 0.8rem;
            font-size: 1.5rem;
            margin-top: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .lang-toggle:hover {
            background: #005c04;
        }

        @media (max-width: 400px) {
            .card {
                padding: 1rem;
            }
        }


    </style>
</head>
<body>
<div class="card">

    <svg class="card-border" viewBox="0 0 1000 1400" preserveAspectRatio="none">
        <defs>
            <path id="borderPath" d="M 20,40 Q 20,20 40,20 H 960 Q 980,20 980,40 V 1360 Q 980,1380 960,1380 H 40 Q 20,1380 20,1360 Z" />
        </defs>
        <text font-size="17" font-family="Bricolage Grotesque, sans-serif" fill="#111">
            <textPath href="#borderPath" startOffset="0%">
                JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS · JUST ANOTHER CODING BUSINESS ·
            </textPath>
        </text>
    </svg>

    <img src="/Assets/png/logo-no-background.png" alt="JACB Logo" />

    <h1>Just Another <br> Coding Business</h1>

    <div class="content">
        <div class="info">
            <p>
                <span class="label-email" data-en="Email: " data-es="Correo: ">Correo: </span>
                <a href="mailto:jacb.business@gmail.com">jacb.business@gmail.com</a>
            </p>
            <p>
                <span class="label-phone" data-en="Phone: " data-es="Teléfono: ">Teléfono: </span>
                <a href="tel:(+31) 6 12-74-75-93">(+31) 6 12-74-75-93</a>
            </p>
            <p>
                <span class="label-address" data-en="Address: " data-es="Dirección: ">Dirección: </span>
                <a href="https://maps.google.com/?q=Jeroenstraat+17,+9783+IL,+Groningen" target="_blank">
                    Jeroenstraat 17, 9783 IL, Groningen
                </a>
            </p>
        </div>
    </div>

    <button class="lang-toggle" onclick="switchLanguage()">🇬🇧</button>
</div>

<script>
    let currentLang = 'es';

    function switchLanguage() {
        currentLang = currentLang === 'en' ? 'es' : 'en';

        document.querySelector('.lang-toggle').textContent = currentLang === 'es' ? '🇬🇧' : '🇪🇸';

        document.querySelectorAll('[data-en]').forEach(el => {
            el.textContent = el.getAttribute('data-' + currentLang);
        });
    }
</script>
</body>
</html>
